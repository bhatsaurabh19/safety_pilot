embedding:
  provider: ollama
  model: mxbai-embed-large:latest

llm:
  provider: ollama
  model: llama3.2:latest

  generation:
    temperature: 0.0
    top_p: 0.9
    top_k: 40
    max_tokens: 1024

retrieval:
  top_k: 5
  min_score: 0.3   # filter weak matches

evaluation:
  mode: strict
  evidence_retries: 2
  weak_evidence_threshold: 0.45
